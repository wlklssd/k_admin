name: pezmax-go-admin

services:
  postgres:
    image: postgres:11-alpine
    container_name: pezmax-go-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PEZMAX_DB_NAME:-pezmax}
      POSTGRES_USER: ${PEZMAX_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PEZMAX_DB_PASSWORD:-pezmax_dev_pwd}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "${PEZMAX_DB_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tests/data/admin_pg.sql:/docker-entrypoint-initdb.d/10-admin_pg.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  adminer:
    image: adminer:4.8.1
    container_name: pezmax-go-admin-adminer
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "${PEZMAX_ADMINER_PORT:-18080}:8080"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

networks:
  backend:
    name: pezmax-go-admin-backend

volumes:
  postgres_data:
    name: pezmax-go-admin-postgres-data
